name: TeeBot - Auto Book Tee Time

on:
  schedule:
    # Runs Monday at 20:29 UTC (= 20:29 Irish time in winter, 21:29 in summer)
    # Adjust to 19:29 UTC in summer (when Ireland is UTC+1)
    - cron: '29 20 * * 1'
  workflow_dispatch:  # Also allows manual trigger

jobs:
  book-tee-time:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run TeeBot
        env:
          BRS_EMAIL: ${{ secrets.BRS_EMAIL }}
          BRS_PASSWORD: ${{ secrets.BRS_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python book_tee_time.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: teebot-screenshots-${{ github.run_id }}
          path: |
            confirmation_*.png
            error_*.png
            debug_*.png
          retention-days: 7
