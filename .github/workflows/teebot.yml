name: TeeBot - Auto Book Tee Time

on:
  schedule:
    - cron: '27 20 * * 1'   # 20:27 UTC = 21:27 Irish summer (UTC+1) — too late
    - cron: '27 19 * * 1'   # 19:27 UTC = 20:27 Irish summer (UTC+1) ✅
  workflow_dispatch:

jobs:
  book-slot-1:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
      - name: Book slot 1
        env:
          BRS_EMAIL: ${{ secrets.BRS_EMAIL }}
          BRS_PASSWORD: ${{ secrets.BRS_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BOOKING_INDEX: "0"
          RELEASE_TIME: "20:30"
        run: python book_tee_time.py
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slot-1-${{ github.run_id }}
          path: |
            confirmation_*.png
            error_*.png
            debug_*.png
          retention-days: 7

