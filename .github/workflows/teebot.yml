name: TeeBot - Auto Book Tee Time

on:
  schedule:
    - cron: '29 20 * * 1'   # 20:29 UTC = 20:29 Irish winter time
    - cron: '29 19 * * 1'   # 19:29 UTC = 20:29 Irish summer time (UTC+1)
  workflow_dispatch:

jobs:
  # Job 1 — always runs, books first booking in players.json
  book-slot-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
      - name: Book slot 1
        env:
          BRS_EMAIL: ${{ secrets.BRS_EMAIL }}
          BRS_PASSWORD: ${{ secrets.BRS_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BOOKING_INDEX: "0"
        run: python book_tee_time.py
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slot-1-${{ github.run_id }}
          path: |
            confirmation_*.png
            error_*.png
            debug_*.png
          retention-days: 7

  # Job 2 — runs in parallel, books second booking if it exists
  book-slot-2:
