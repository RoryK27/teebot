name: TeeBot - Scheduler (runs every 5 mins)

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes, 24/7
  workflow_dispatch:         # Manual trigger for testing

jobs:
  check-and-fire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check release time and fire booking if due
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, urllib.error, os, sys
          from datetime import datetime, timezone

          REPO  = os.environ["GITHUB_REPOSITORY"]
          TOKEN = os.environ["GITHUB_TOKEN"]

          def gh(path, method="GET", body=None):
              url = f"https://api.github.com/repos/{REPO}/{path}"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {TOKEN}",
                  "Accept": "application/vnd.github.v3+json",
                  "Content-Type": "application/json",
              }, method=method)
              if body:
                  req.data = json.dumps(body).encode()
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # Load players.json
          try:
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{REPO}/contents/players.json",
                  headers={"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3.raw"}
              )
              with urllib.request.urlopen(req) as r:
                  data = json.loads(r.read())
          except Exception as e:
              print(f"Could not load players.json: {e}")
              sys.exit(0)

          release_str = data.get("release_time")
          release_type = data.get("release_type", "default")

          if not release_str or release_type == "default":
              print("No custom release time set — scheduler not needed (Monday 20:30 cron handles default)")
              sys.exit(0)

          # Parse release time (ISO format: 2026-05-05T09:25:00)
          try:
              release_dt = datetime.fromisoformat(release_str)
          except Exception as e:
              print(f"Could not parse release_time '{release_str}': {e}")
              sys.exit(0)

          now = datetime.now()
          diff_secs = (release_dt - now).total_seconds()

          print(f"Release time : {release_dt.strftime('%A %d %B %Y %H:%M')}")
          print(f"Current time : {now.strftime('%A %d %B %Y %H:%M')}")
          print(f"Difference   : {diff_secs:.0f} seconds")

          # Fire if within 0-300 seconds of release time (5 min window)
          if -60 <= diff_secs <= 300:
              print(f"✅ Release time is NOW — triggering booking workflows!")

              # Count how many bookings there are
              bookings = data.get("bookings", [])
              print(f"   Firing {len(bookings)} booking job(s) in parallel...")

              # Trigger the main booking workflow
              try:
                  gh("actions/workflows/teebot.yml/dispatches", method="POST", body={"ref": "main"})
                  print("   ✅ teebot.yml triggered")
              except Exception as e:
                  print(f"   ❌ Failed to trigger teebot.yml: {e}")
                  sys.exit(1)

              # Clear the custom release time so this doesn't re-fire next cycle
              print("   Clearing custom release time from players.json...")
              try:
                  # Get current SHA
                  req2 = urllib.request.Request(
                      f"https://api.github.com/repos/{REPO}/contents/players.json",
                      headers={"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json"}
                  )
                  with urllib.request.urlopen(req2) as r:
                      file_data = json.loads(r.read())
                  sha = file_data["sha"]

                  # Remove release_time and reset to default
                  data["release_type"] = "default"
                  data.pop("release_time", None)

                  import base64
                  new_content = base64.b64encode(json.dumps(data, indent=2).encode()).decode()

                  update_req = urllib.request.Request(
                      f"https://api.github.com/repos/{REPO}/contents/players.json",
                      headers={"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json"},
                      method="PUT"
                  )
                  update_req.data = json.dumps({
                      "message": "TeeBot: clear custom release time after trigger",
                      "content": new_content,
                      "sha": sha
                  }).encode()
                  with urllib.request.urlopen(update_req) as r:
                      print("   ✅ Release time cleared")
              except Exception as e:
                  print(f"   ⚠️  Could not clear release time: {e}")

          elif diff_secs < -60:
              print(f"⏭  Release time was {abs(diff_secs):.0f}s ago — already passed, skipping")
          else:
              mins = diff_secs / 60
              print(f"⏳ Release in {mins:.1f} mins — not yet")

          PYEOF
