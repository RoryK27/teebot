<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeeBot — Beaverstown</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a1a0f;
    --surface: #111f15;
    --surface2: #162019;
    --green: #4ade80;
    --green-dark: #14532d;
    --green-glow: rgba(74,222,128,0.12);
    --text: #f0faf2;
    --muted: #6b8f72;
    --border: #1e3424;
    --red: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 80px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(74,222,128,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 500px; }

  header { text-align: center; padding: 44px 0 28px; }

  .flag {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--green-dark);
    border: 1px solid rgba(74,222,128,0.2);
    border-radius: 100px; padding: 5px 14px;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--green); margin-bottom: 16px;
  }

  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(36px, 9vw, 56px);
    line-height: 0.95; letter-spacing: -1px;
  }

  h1 em { font-family: 'Instrument Serif', serif; font-style: italic; color: var(--green); }

  .club-name {
    margin-top: 10px; color: var(--muted); font-size: 13px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  .club-name::before { content: '📍'; font-size: 12px; }

  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin: 28px 0 12px;
  }

  .section-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .section-badge { font-size: 11px; color: var(--green); font-variant-numeric: tabular-nums; }

  /* ── Days ── */
  .days-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 6px; margin-bottom: 14px;
  }

  .day-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 4px;
    cursor: pointer; text-align: center; transition: all 0.15s; user-select: none;
  }

  .day-btn:hover { border-color: rgba(74,222,128,0.3); }
  .day-btn.active { border-color: var(--green); background: var(--surface2); box-shadow: 0 0 0 1px var(--green); }

  .day-short { font-size: 10px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 4px; }
  .day-btn.active .day-short { color: var(--green); }

  .day-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); margin: 0 auto; transition: background 0.15s; }
  .day-btn.active .day-dot { background: var(--green); }

  .schedule-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }

  .schedule-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .schedule-row-header {
    display: flex; align-items: center;
    padding: 12px 16px; gap: 12px;
  }

  .day-name-badge { font-weight: 600; font-size: 13px; color: var(--text); min-width: 90px; }

  .time-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'Instrument Sans', monospace;
    font-size: 14px; font-weight: 600;
    padding: 7px 10px; width: 100px; outline: none;
    transition: border-color 0.15s; cursor: pointer;
  }

  .time-input:focus { border-color: var(--green); }
  .time-input::-webkit-calendar-picker-indicator {
    filter: invert(0.6) sepia(1) saturate(3) hue-rotate(90deg); cursor: pointer;
  }

  .remove-day {
    margin-left: auto; background: none; border: none;
    color: var(--muted); cursor: pointer; font-size: 18px;
    line-height: 1; padding: 4px 6px; border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  .remove-day:hover { color: var(--red); background: rgba(248,113,113,0.08); }

  .time-presets { display: flex; gap: 6px; padding: 0 16px 12px; flex-wrap: wrap; }

  .preset-pill {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 100px; padding: 4px 10px;
    font-size: 11px; color: var(--muted); cursor: pointer;
    transition: all 0.15s; font-family: 'Instrument Sans', monospace; letter-spacing: 0.5px;
  }
  .preset-pill:hover { border-color: rgba(74,222,128,0.4); color: var(--green); }
  .preset-pill.active { background: var(--green-dark); border-color: var(--green); color: var(--green); }

  .no-days {
    text-align: center; padding: 20px; color: var(--muted); font-size: 13px;
    font-style: italic; background: var(--surface);
    border: 1px dashed var(--border); border-radius: 12px;
  }

  /* ── Players ── */
  .players-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }

  .player-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 13px 14px;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 10px;
    user-select: none; position: relative; overflow: hidden;
  }

  .player-card::before {
    content: ''; position: absolute; inset: 0;
    background: var(--green-glow); opacity: 0; transition: opacity 0.15s;
  }

  .player-card:hover { border-color: rgba(74,222,128,0.3); }
  .player-card:hover::before { opacity: 0.6; }
  .player-card.selected { border-color: var(--green); background: var(--surface2); }
  .player-card.selected::before { opacity: 1; }
  .player-card.maxed { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
  .player-card.selected.maxed { opacity: 1; pointer-events: all; }

  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--green-dark); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--green);
    font-family: 'Archivo Black', sans-serif;
    flex-shrink: 0; transition: all 0.15s; position: relative; z-index: 1;
    letter-spacing: -0.5px;
  }

  .player-card.selected .avatar { background: var(--green); color: var(--bg); border-color: var(--green); }

  .player-info { position: relative; z-index: 1; flex: 1; min-width: 0; }

  .player-first { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-last  { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-card.selected .player-last { color: rgba(74,222,128,0.6); }

  .check {
    width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1; flex-shrink: 0; transition: all 0.15s;
  }
  .player-card.selected .check { background: var(--green); border-color: var(--green); }
  .check svg { opacity: 0; transition: opacity 0.15s; }
  .player-card.selected .check svg { opacity: 1; }

  /* ── Summary ── */
  .summary-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
    min-height: 56px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
  }

  .summary-lbl { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); width: 100%; margin-bottom: 2px; }

  .summary-chip {
    background: var(--green-dark); border: 1px solid rgba(74,222,128,0.3);
    color: var(--green); font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 100px;
    animation: popIn 0.18s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.75); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .summary-empty { color: var(--muted); font-size: 13px; font-style: italic; }

  /* ── Button ── */
  .confirm-btn {
    width: 100%; padding: 17px;
    background: var(--green); color: var(--bg); border: none;
    border-radius: 12px; font-family: 'Archivo Black', sans-serif;
    font-size: 16px; letter-spacing: 0.5px; cursor: pointer;
    transition: all 0.18s; position: relative; overflow: hidden;
  }

  .confirm-btn:hover:not(:disabled) {
    background: #86efac; transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(74,222,128,0.2);
  }

  .confirm-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .confirm-btn.loading::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shimmer 1.2s infinite;
  }

  @keyframes shimmer {
    from { transform: translateX(-100%); }
    to   { transform: translateX(100%); }
  }

  .status { margin-top: 14px; padding: 13px 16px; border-radius: 10px; font-size: 13px; display: none; line-height: 1.5; }
  .status.success { display: block; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--green); }
  .status.error   { display: block; background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }

  .last-saved { text-align: center; margin-top: 16px; font-size: 12px; color: var(--muted); }
  .last-saved span { color: var(--green); }

  .divider { height: 1px; background: var(--border); margin: 28px 0; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="flag">⛳ TeeBot</div>
    <h1>Plan Your<br><em>Week</em></h1>
    <p class="club-name">Beaverstown Golf Club</p>
  </header>

  <!-- ── DAYS ── -->
  <div class="section-head">
    <span class="section-label">Days to Book</span>
    <span class="section-badge" id="dayCount">0 days selected</span>
  </div>

  <div class="days-grid" id="daysGrid"></div>
  <div class="schedule-list" id="scheduleList"></div>

  <div class="divider"></div>

  <!-- ── PLAYERS ── -->
  <div class="section-head">
    <span class="section-label">Squad</span>
    <span class="section-badge" id="playerCount">0 / 4 selected</span>
  </div>

  <div class="players-grid" id="playersGrid"></div>

  <div class="summary-bar" id="summaryBar">
    <div class="summary-lbl">Booked for</div>
    <span class="summary-empty">No players selected</span>
  </div>

  <button class="confirm-btn" id="confirmBtn" disabled onclick="saveSelection()">
    Save This Week's Plan
  </button>

  <div class="status" id="status"></div>
  <div class="last-saved" id="lastSaved"></div>

</div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const CONFIG = {
  GITHUB_TOKEN: "",        // Your GitHub personal access token
  REPO_OWNER:   "RoryK27",        // Your GitHub username
  REPO_NAME:    "teebot",
  FILE_PATH:    "players.json",
};

// ── Real names from your Beaverstown buddy list ───────────────────────────────
const PLAYERS = [
  { first: "Rory",   last: "Kirwan",          brs: "Kirwan, Rory"          },
  { first: "Lisa",   last: "Kirwan",          brs: "Kirwan, Lisa"          },
  { first: "Paul",   last: "Carrick",         brs: "Carrick, Paul"         },
  { first: "Ronan",  last: "Hennelly",        brs: "Hennelly, Ronan"       },
  { first: "Peter",  last: "Kelly 'Seve'",    brs: "Kelly, Peter 'Seve'"   },
  { first: "Edward", last: "Kelly",           brs: "Kelly, Edward"         },
  { first: "Barry",  last: "Kirwan",          brs: "Kirwan, Barry"         },
  { first: "Mary",   last: "Kirwan",          brs: "Kirwan, Mary"          },
  { first: "Simon",  last: "Legge",           brs: "Legge, Simon"          },
  { first: "Niall",  last: "Lynch",           brs: "Lynch, Niall"          },
  { first: "George", last: "Moore",           brs: "Moore, George"         },
];

const DAYS = [
  { key:"mon", label:"Mon", full:"Monday",    dow:0 },
  { key:"tue", label:"Tue", full:"Tuesday",   dow:1 },
  { key:"wed", label:"Wed", full:"Wednesday", dow:2 },
  { key:"thu", label:"Thu", full:"Thursday",  dow:3 },
  { key:"fri", label:"Fri", full:"Friday",    dow:4 },
  { key:"sat", label:"Sat", full:"Saturday",  dow:5 },
  { key:"sun", label:"Sun", full:"Sunday",    dow:6 },
];

const TIME_PRESETS = ["07:00","08:00","08:20","09:00","10:00","12:00","14:00","17:00","18:00","19:00"];

const activeDays      = {};
const selectedPlayers = new Set();

// ── Days ──────────────────────────────────────────────────────────────────────
function buildDaysGrid() {
  const grid = document.getElementById("daysGrid");
  DAYS.forEach(d => {
    const btn = document.createElement("div");
    btn.className = "day-btn";
    btn.id = `daybtn-${d.key}`;
    btn.innerHTML = `<span class="day-short">${d.label}</span><div class="day-dot"></div>`;
    btn.addEventListener("click", () => toggleDay(d));
    grid.appendChild(btn);
  });
}

function toggleDay(d) {
  if (activeDays[d.key]) {
    delete activeDays[d.key];
    document.getElementById(`daybtn-${d.key}`).classList.remove("active");
  } else {
    activeDays[d.key] = { time: "08:20" };
    document.getElementById(`daybtn-${d.key}`).classList.add("active");
  }
  renderScheduleList();
  updateConfirmBtn();
}

function renderScheduleList() {
  const list = document.getElementById("scheduleList");
  list.innerHTML = "";
  const keys = Object.keys(activeDays);
  document.getElementById("dayCount").textContent =
    keys.length === 0 ? "0 days selected" : `${keys.length} day${keys.length > 1 ? "s" : ""} selected`;

  if (keys.length === 0) {
    list.innerHTML = `<div class="no-days">Tap a day above to add it to your week</div>`;
    return;
  }

  DAYS.filter(d => activeDays[d.key]).forEach(d => {
    const currentTime = activeDays[d.key].time;
    const row = document.createElement("div");
    row.className = "schedule-row";

    const presetsHtml = TIME_PRESETS.map(t =>
      `<span class="preset-pill ${t === currentTime ? 'active' : ''}" data-day="${d.key}" data-time="${t}">${t}</span>`
    ).join("");

    row.innerHTML = `
      <div class="schedule-row-header">
        <span class="day-name-badge">${d.full}</span>
        <input type="time" class="time-input" id="time-${d.key}" value="${currentTime}">
        <button class="remove-day" onclick="removeDay('${d.key}')">×</button>
      </div>
      <div class="time-presets">${presetsHtml}</div>
    `;
    list.appendChild(row);

    row.querySelector(`#time-${d.key}`).addEventListener("change", e => {
      activeDays[d.key].time = e.target.value;
      row.querySelectorAll(".preset-pill").forEach(p => p.classList.toggle("active", p.dataset.time === e.target.value));
    });

    row.querySelectorAll(".preset-pill").forEach(pill => {
      pill.addEventListener("click", () => {
        const t = pill.dataset.time;
        activeDays[d.key].time = t;
        row.querySelector(`#time-${d.key}`).value = t;
        row.querySelectorAll(".preset-pill").forEach(p => p.classList.toggle("active", p.dataset.time === t));
      });
    });
  });
}

function removeDay(key) {
  delete activeDays[key];
  document.getElementById(`daybtn-${key}`).classList.remove("active");
  renderScheduleList();
  updateConfirmBtn();
}

// ── Players ───────────────────────────────────────────────────────────────────
function buildPlayersGrid() {
  const grid = document.getElementById("playersGrid");
  PLAYERS.forEach((p, i) => {
    const initials = p.first.charAt(0) + p.last.charAt(0);
    const card = document.createElement("div");
    card.className = "player-card";
    card.dataset.brs = p.brs;
    card.dataset.name = p.first;
    card.innerHTML = `
      <div class="avatar">${initials}</div>
      <div class="player-info">
        <div class="player-first">${p.first}</div>
        <div class="player-last">${p.last}</div>
      </div>
      <div class="check">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 3.5L3.8 7L9 1" stroke="#0a1a0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    `;
    card.style.cssText = `opacity:0;transform:translateY(10px);transition:opacity .25s ease ${i*0.04}s,transform .25s ease ${i*0.04}s,border-color .15s,background .15s`;
    card.addEventListener("click", () => togglePlayer(p, card));
    grid.appendChild(card);
    requestAnimationFrame(() => setTimeout(() => {
      card.style.opacity = "1"; card.style.transform = "translateY(0)";
    }, 30));
  });
}

function togglePlayer(p, card) {
  if (selectedPlayers.has(p.brs)) {
    selectedPlayers.delete(p.brs);
    card.classList.remove("selected");
  } else {
    if (selectedPlayers.size >= 4) return;
    selectedPlayers.add(p.brs);
    card.classList.add("selected");
  }
  document.querySelectorAll(".player-card").forEach(c => {
    c.classList.toggle("maxed", !selectedPlayers.has(c.dataset.brs) && selectedPlayers.size >= 4);
  });
  updateSummary();
  updateConfirmBtn();
}

function updateSummary() {
  const bar = document.getElementById("summaryBar");
  bar.innerHTML = '<div class="summary-lbl">Booked for</div>';
  document.getElementById("playerCount").textContent = `${selectedPlayers.size} / 4 selected`;
  if (selectedPlayers.size === 0) {
    bar.innerHTML += '<span class="summary-empty">No players selected</span>';
    return;
  }
  selectedPlayers.forEach(brs => {
    const p = PLAYERS.find(x => x.brs === brs);
    const chip = document.createElement("span");
    chip.className = "summary-chip";
    chip.textContent = p ? p.first : brs;
    bar.appendChild(chip);
  });
}

function updateConfirmBtn() {
  document.getElementById("confirmBtn").disabled =
    !(Object.keys(activeDays).length > 0 && selectedPlayers.size === 4);
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveSelection() {
  const btn = document.getElementById("confirmBtn");
  const statusEl = document.getElementById("status");

  if (!CONFIG.GITHUB_TOKEN || !CONFIG.REPO_OWNER) {
    statusEl.className = "status error";
    statusEl.textContent = "⚠️ Set your GITHUB_TOKEN and REPO_OWNER in the CONFIG block at the top of this file's script tag.";
    return;
  }

  btn.classList.add("loading");
  btn.textContent = "Saving...";
  statusEl.className = "status";

  const bookings = DAYS.filter(d => activeDays[d.key]).map(d => ({
    label:       d.full,
    day_of_week: d.dow,
    target_time: activeDays[d.key].time,
    players:     4,
  }));

  const payload = {
    players:  Array.from(selectedPlayers),   // BRS format: "Surname, Firstname"
    bookings,
    updated:  new Date().toISOString(),
    club_url: "https://members.brsgolf.com/beaverstown/tee-sheet/1",
  };

  try {
    const apiBase = `https://api.github.com/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/contents/${CONFIG.FILE_PATH}`;
    let sha = null;
    try {
      const res = await fetch(apiBase, { headers: { Authorization: `token ${CONFIG.GITHUB_TOKEN}` } });
      if (res.ok) sha = (await res.json()).sha;
    } catch (_) {}

    const put = await fetch(apiBase, {
      method: "PUT",
      headers: { Authorization: `token ${CONFIG.GITHUB_TOKEN}`, "Content-Type": "application/json" },
      body: JSON.stringify({
        message: `TeeBot: ${bookings.map(b=>b.label).join(", ")} — ${Array.from(selectedPlayers).map(b=>b.split(",")[1]?.trim()||b).join(", ")}`,
        content: btoa(JSON.stringify(payload, null, 2)),
        ...(sha ? { sha } : {}),
      }),
    });

    if (put.ok) {
      const names = Array.from(selectedPlayers).map(b => b.split(",")[1]?.trim() || b);
      statusEl.className = "status success";
      statusEl.textContent = `✅ Saved! Booking ${names.join(", ")} — ${bookings.map(b=>`${b.label} ${b.target_time}`).join(" · ")}`;
      document.getElementById("lastSaved").innerHTML =
        `Saved at <span>${new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</span>`;
    } else {
      throw new Error(`GitHub API ${put.status}`);
    }
  } catch (err) {
    statusEl.className = "status error";
    statusEl.textContent = `❌ Save failed: ${err.message}`;
  }

  btn.classList.remove("loading");
  btn.textContent = "Save This Week's Plan";
}

buildDaysGrid();
renderScheduleList();
buildPlayersGrid();
</script>
</body>
</html>
